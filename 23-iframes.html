<!DOCTYPE html>
<html>
<head>
    <title>Leccion 23 - Iframes HTML</title>
</head>
<body>

    <h2>Iframe basico</h2>
    <iframe src="https://www.w3schools.com" title="Sitio de W3Schools"></iframe>

    <h2>Iframe con tamaño (width y height como atributos)</h2>
    <iframe src="https://www.w3schools.com" height="200" width="300" title="Ejemplo de iframe con tamaño"></iframe>

    <h2>Iframe con tamaño usando style</h2>
    <iframe src="https://www.w3schools.com" style="height:200px;width:300px;" title="Ejemplo de iframe con style"></iframe>

    <h2>Iframe sin borde</h2>
    <iframe src="https://www.w3schools.com" style="height:200px;width:300px;border:none;" title="Iframe sin borde"></iframe>

    <h2>Iframe con borde personalizado</h2>
    <iframe src="https://www.w3schools.com" style="height:200px;width:300px;border:3px solid red;" title="Iframe con borde rojo"></iframe>

    <h2>Iframe como destino de un enlace (target)</h2>
    <iframe src="https://www.w3schools.com" name="iframe_a" style="height:250px;width:100%;" title="Iframe destino"></iframe>
    <p><a href="https://www.wikipedia.org" target="iframe_a">Abrir Wikipedia dentro del iframe de arriba</a></p>
    <p><a href="https://www.w3schools.com/html/" target="iframe_a">Abrir HTML de W3Schools dentro del iframe de arriba</a></p>

</body>
</html>
