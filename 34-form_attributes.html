<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<body>

<h1>HTML Form Attributes</h1>

<!-- 1. The Action and Method (GET) Attributes -->
<h2>Form with Action and Method="get" (Default)</h2>
<form action="/action_page.php" method="get">
  <label for="fname_get">First name:</label><br>
  <input type="text" id="fname_get" name="fname" value="John"><br>
  <label for="lname_get">Last name:</label><br>
  <input type="text" id="lname_get" name="lname" value="Doe"><br><br>
  <input type="submit" value="Submit (GET)">
</form>

<!-- 2. The Method (POST) and Target Attributes -->
<h2>Form with Method="post" and Target="_blank"</h2>
<form action="/action_page.php" method="post" target="_blank">
  <label for="fname_post">First name:</label><br>
  <input type="text" id="fname_post" name="fname" value="John"><br>
  <label for="lname_post">Last name:</label><br>
  <input type="text" id="lname_post" name="lname" value="Doe"><br><br>
  <input type="submit" value="Submit (POST in New Tab)">
</form>

<!-- 3. The Autocomplete Attribute -->
<h2>Form with Autocomplete Off</h2>
<form action="/action_page.php" autocomplete="off">
  <label for="email">Email:</label><br>
  <input type="email" id="email" name="email"><br><br>
  <input type="submit" value="Submit">
</form>

<!-- 4. The Novalidate Attribute -->
<h2>Form with Novalidate (Skips Browser Validation)</h2>
<form action="/action_page.php" novalidate>
  <label for="user_email">Required Email Field:</label><br>
  <input type="email" id="user_email" name="user_email" required><br><br>
  <input type="submit" value="Submit Without Validation">
</form>

<p>2026 W3Schools</p>

</body>
</html>
