<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<body>

<h1>HTML Form Elements</h1>

<!-- 1. Input and Label Elements -->
<h2>Input & Label</h2>
<form>
  <label for="fname">First name:</label>
  <input type="text" id="fname" name="fname">
</form>

<!-- 2. Select, Option, and Optgroup Elements -->
<h2>Select Drop-down List</h2>
<form>
  <label for="cars">Choose a car:</label>
  <select id="cars" name="cars">
    <optgroup label="Swedish Cars">
      <option value="volvo">Volvo</option>
      <option value="saab">Saab</option>
    </optgroup>
    <optgroup label="German Cars">
      <option value="fiat" selected>Fiat (Pre-selected)</option>
      <option value="audi">Audi</option>
    </optgroup>
  </select>
</form>

<h3>Select with Size Attribute</h3>
<form>
  <label for="cars_size">Choose a car (3 visible values):</label><br>
  <select id="cars_size" name="cars" size="3">
    <option value="volvo">Volvo</option>
    <option value="saab">Saab</option>
    <option value="fiat">Fiat</option>
    <option value="audi">Audi</option>
  </select>
</form>

<h3>Select with Multiple Attribute</h3>
<form>
  <label for="cars_multiple">Choose multiple cars (Hold Ctrl/Cmd):</label><br>
  <select id="cars_multiple" name="cars" size="4" multiple>
    <option value="volvo">Volvo</option>
    <option value="saab">Saab</option>
    <option value="fiat">Fiat</option>
    <option value="audi">Audi</option>
  </select>
</form>

<!-- 3. Textarea Element -->
<h2>Textarea (Multi-line Input Field)</h2>
<form>
  <label for="msg">Message (Rows/Cols):</label><br>
  <textarea id="msg" name="message" rows="5" cols="30">The cat was playing in the garden.</textarea>
  <br><br>
  <label for="msg_css">Message (CSS styled):</label><br>
  <textarea id="msg_css" name="message_css" style="width:250px; height:80px;">Styled using CSS width and height.</textarea>
</form>

<!-- 4. Button Element -->
<h2>Button Element</h2>
<form>
  <button type="button" onclick="alert('Hello World!')">Click Me!</button>
</form>

<!-- 5. Fieldset and Legend Elements -->
<h2>Fieldset and Legend</h2>
<form action="/action_page.php">
  <fieldset>
    <legend>Personalia:</legend>
    <label for="fname_fs">First name:</label><br>
    <input type="text" id="fname_fs" name="fname" value="John"><br>
    <label for="lname_fs">Last name:</label><br>
    <input type="text" id="lname_fs" name="lname" value="Doe"><br><br>
    <input type="submit" value="Submit">
  </fieldset>
</form>

<!-- 6. Datalist Element -->
<h2>Datalist Element</h2>
<form action="/action_page.php">
  <label for="browser_input">Choose a browser from the list:</label><br>
  <input list="browsers" id="browser_input" name="browser">
  <datalist id="browsers">
    <option value="Edge">
    <option value="Firefox">
    <option value="Chrome">
    <option value="Opera">
    <option value="Safari">
  </datalist>
  <br><br>
  <input type="submit">
</form>

<!-- 7. Output Element -->
<h2>Output Element</h2>
<form action="/action_page.php" oninput="x.value=parseInt(a.value)+parseInt(b.value)">
  0 <input type="range" id="a" name="a" value="50"> 100
  +
  <input type="number" id="b" name="b" value="50">
  =
  <output name="x" for="a b">100</output>
  <br><br>
  <input type="submit">
</form>

<p>2026 W3Schools</p>

</body>
</html>
